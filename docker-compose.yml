version: '3.9'

services:
  workspace-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workspace-backend
    ports:
      - "13596:13596"
    environment:
      DATABASE_URL: file:/app/data/dev.db
      PORT: 13596
    volumes:
      - ./workspace_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:13596/api/health').then(r => process.exit(r.ok?0:1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  workspace-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workspace-frontend
    ports:
      - "17135:80"
    depends_on:
      workspace-backend:
        condition: service_healthy
    restart: unless-stopped
