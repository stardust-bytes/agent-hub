version: '3.9'

services:
  workspace-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workspace-backend
    environment:
      DATABASE_URL: file:/app/data/dev.db
      PORT: 130596
    volumes:
      - ./workspace_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:130596/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  workspace-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workspace-frontend
    ports:
      - "3000:80"
    depends_on:
      workspace-backend:
        condition: service_healthy
    restart: unless-stopped
